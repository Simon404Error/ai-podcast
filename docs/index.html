<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 播客 - 文稿转播客音频</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
.hidden{display:none!important}
:root,[data-theme=dark]{--bg:#0d0d0f;--bg2:#141417;--bg3:#1c1c20;--bg4:#242429;--bdr:#2a2a30;--tx1:#eeeef0;--tx2:#9d9da6;--tx3:#5e5e6a;--ac:#8b5cf6;--ac2:#7c3aed;--acd:rgba(139,92,246,.15);--ha:#c4b5fd;--hb:#34d399;--rd:#ef4444;--gr:#22c55e;--ps:linear-gradient(135deg,#1a1025 0%,#0f1a1a 100%)}
[data-theme=light]{--bg:#f5f5f7;--bg2:#fff;--bg3:#f0f0f3;--bg4:#e5e5ea;--bdr:#dcdce0;--tx1:#1a1a1e;--tx2:#5c5c66;--tx3:#9d9da6;--ac:#7c3aed;--ac2:#6d28d9;--acd:rgba(124,58,237,.1);--ha:#7c3aed;--hb:#059669;--ps:linear-gradient(135deg,#ede9fe 0%,#ecfdf5 100%)}
[data-theme=purple]{--bg:#0f0b1a;--bg2:#171228;--bg3:#1f1835;--bg4:#282042;--bdr:#2d2348;--tx1:#f0ebff;--tx2:#a89cc8;--tx3:#685e8a;--ac:#a78bfa;--ac2:#8b5cf6;--acd:rgba(167,139,250,.18);--ha:#c4b5fd;--hb:#6ee7b7;--ps:linear-gradient(135deg,#1a0f2e 0%,#0f1a28 100%)}
[data-theme=gray]{--bg:#1a1a1c;--bg2:#222226;--bg3:#2a2a30;--bg4:#33333a;--bdr:#383842;--tx1:#e4e4e8;--tx2:#8d8d96;--tx3:#56565e;--ac:#818cf8;--ac2:#6366f1;--acd:rgba(129,140,248,.15);--ha:#a5b4fc;--hb:#34d399;--ps:linear-gradient(135deg,#1e1e2a 0%,#1a2222 100%)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--tx1);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
.app{max-width:1340px;margin:0 auto;padding:0 20px 32px}
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 0;margin-bottom:20px;border-bottom:1px solid var(--bdr)}
.header-left{display:flex;align-items:center;gap:10px}
.header-left svg{width:24px;height:24px;color:var(--ac)}
.header-left h1{font-size:18px;font-weight:700;letter-spacing:-.2px}
.header-subtitle{font-size:13px;color:var(--tx3);padding-left:10px;border-left:1px solid var(--bdr)}
.header-right{display:flex;align-items:center;gap:8px}
.theme-switcher{display:flex;gap:3px;background:var(--bg3);border-radius:20px;padding:2px}
.theme-dot{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s}
.theme-dot:hover{transform:scale(1.1)}
.theme-dot.active{border-color:var(--ac);box-shadow:0 0 8px var(--acd)}
.theme-dot.dark{background:#141417}.theme-dot.light{background:#f5f5f7}.theme-dot.purple{background:#171228}.theme-dot.gray{background:#222226}
.save-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;font-size:12px;border:1px solid var(--bdr);background:var(--bg3);color:var(--tx2);border-radius:20px;cursor:pointer;transition:all .15s;font-family:inherit}
.save-btn:hover{background:var(--bg4);color:var(--tx1)}.save-btn.saved{background:var(--acd);border-color:var(--ac);color:var(--ac)}
.main{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.panel{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.panel-header{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.panel-header h2{font-size:14px;font-weight:600}
.mode-desc{font-size:12px;color:var(--tx3);margin-top:4px}
.header-actions{display:flex;gap:6px}
.action-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;cursor:pointer;color:var(--tx2);font-size:12px;transition:all .15s;border:1px solid var(--bdr)}
.action-btn:hover{background:var(--bg4);color:var(--tx1)}
.action-btn input{display:none}
.editor-panel{display:flex;flex-direction:column;min-height:calc(100vh - 140px)}
.mode-content{flex:1;display:flex;flex-direction:column;padding:0}
.mode-content.hidden{display:none}
textarea{flex:1;width:100%;background:transparent;border:none;color:var(--tx1);font-size:14px;font-family:"PingFang SC","Microsoft YaHei",monospace;line-height:1.8;padding:16px 18px;resize:none;outline:none;min-height:300px}
textarea::placeholder{color:var(--tx3)}
.editor-footer{padding:8px 18px;border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.char-count{font-size:11px;color:var(--tx3);font-variant-numeric:tabular-nums}
.right-col{display:flex;flex-direction:column;gap:16px}
.voice-config-grid{display:flex;flex-direction:column;gap:0}
.voice-card{padding:14px 18px;border-bottom:1px solid var(--bdr)}
.voice-card:last-child{border-bottom:none}
.voice-card-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.voice-avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.voice-avatar svg{width:18px;height:18px}
.voice-card-info{flex:1;display:flex;flex-direction:column;gap:5px}
.host-name{background:transparent;border:none;border-bottom:1px solid transparent;color:var(--tx1);font-size:14px;font-weight:600;padding:0 0 2px;width:110px;outline:none;transition:border-color .15s}
.host-name:focus{border-bottom-color:var(--ac)}
.host-voice{background:var(--bg3);border:1px solid var(--bdr);color:var(--tx2);font-size:12px;padding:5px 8px;border-radius:4px;outline:none;cursor:pointer}
.host-remove{width:26px;height:26px;border:none;background:transparent;color:var(--tx3);cursor:pointer;border-radius:4px;font-size:16px;transition:all .15s;flex-shrink:0;margin-top:6px}
.host-remove:hover{background:rgba(239,68,68,.15);color:var(--rd)}.host-preview{font-size:11px;padding:3px 10px;border:1px solid var(--ac);background:transparent;color:var(--ac);border-radius:4px;cursor:pointer;transition:all .15s;font-family:inherit;margin-top:4px;align-self:flex-start}.host-preview:hover{background:var(--acd)}.host-preview.playing{background:var(--ac);color:#fff}
.voice-sliders{display:flex;flex-direction:column;gap:8px}
.slider-group{display:flex;flex-direction:column;gap:2px}
.slider-label{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--tx3)}
.slider-val{color:var(--tx2);font-weight:500;min-width:36px;text-align:right}
.slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:var(--bg3);outline:none;cursor:pointer}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--ac);cursor:pointer;transition:transform .1s}
.slider::-webkit-slider-thumb:hover{transform:scale(1.2)}
.btn-generate{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 36px);margin:0 18px 16px;padding:13px;background:var(--ac);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-generate:hover:not(:disabled){background:var(--ac2);box-shadow:0 4px 16px var(--acd)}
.btn-generate:disabled{opacity:.4;cursor:not-allowed}
.mode-hint{text-align:center;padding:0 18px 14px;font-size:11px;color:var(--tx3);line-height:1.4}
.output-panel{flex:1;display:flex;flex-direction:column;min-height:400px;max-height:calc(100vh - 420px)}
.output-panel.expanded{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;max-height:none;min-height:100vh;border-radius:0;margin:0}
.output-tabs{display:flex;gap:0}
.output-tabs .tab{padding:6px 16px;font-size:13px;border:none;background:transparent;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit}
.output-tabs .tab.active{color:var(--tx1);border-bottom-color:var(--ac)}
.output-tabs .tab:hover:not(.active){color:var(--tx2)}
.expand-btn{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border:none;background:transparent;color:var(--tx3);cursor:pointer;border-radius:4px;transition:all .15s;margin-left:auto}
.expand-btn:hover{color:var(--tx1);background:var(--bg4)}
.output-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.output-content.hidden{display:none}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;color:var(--tx3);flex:1}
.placeholder svg{width:32px;height:32px;margin-bottom:10px;opacity:.35}
.placeholder p{font-size:13px;max-width:260px}
.script-content{padding:12px;overflow-y:auto;flex:1}
.script-content::-webkit-scrollbar{width:5px}
.script-content::-webkit-scrollbar-track{background:transparent}
.script-content::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
.script-segment{display:flex;gap:10px;padding:10px 12px;margin-bottom:4px;border-radius:6px;background:var(--bg3);transition:background .2s;border-left:3px solid transparent}
.script-segment.playing{background:var(--acd)!important}
.script-segment .seg-spkr{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.script-segment .seg-body{flex:1;min-width:0}
.seg-body .seg-name{font-size:11px;font-weight:600;margin-bottom:1px}
.seg-body .seg-txt{font-size:13px;line-height:1.6;color:var(--tx2)}
.player{padding:18px 18px 12px;background:var(--ps);border-bottom:1px solid var(--bdr);flex-shrink:0}
.player-main{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.player-now{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.player-art{width:40px;height:40px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.art-bars{display:flex;align-items:flex-end;gap:2px;height:20px}
.art-bars span{width:3px;background:var(--tx3);border-radius:2px;transition:height .2s,background .3s}
.art-bars span:nth-child(1){height:8px}.art-bars span:nth-child(2){height:15px}.art-bars span:nth-child(3){height:10px}.art-bars span:nth-child(4){height:18px}.art-bars span:nth-child(5){height:6px}
.art-bars.active span{background:var(--ac);animation:eq .7s ease-in-out infinite}
.art-bars.active span:nth-child(1){animation-delay:0s}.art-bars.active span:nth-child(2){animation-delay:.12s}.art-bars.active span:nth-child(3){animation-delay:.24s}.art-bars.active span:nth-child(4){animation-delay:.36s}.art-bars.active span:nth-child(5){animation-delay:.48s}
@keyframes eq{0%,100%{height:5px}50%{height:20px}}
.player-info{flex:1;min-width:0}
.player-speaker{font-size:12px;font-weight:600;margin-bottom:1px}
.player-text{font-size:12px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ctrl-btn{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg4);color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ctrl-btn:hover{background:var(--bdr);color:var(--tx1)}
.ctrl-btn svg{width:14px;height:14px}
.ctrl-play{width:40px;height:40px;background:var(--ac);color:#fff}.ctrl-play:hover{background:var(--ac2);color:#fff}.ctrl-play.playing{background:var(--rd)}
.player-progress{width:100%;height:3px;background:var(--bg3);border-radius:2px;cursor:pointer;margin-bottom:4px}
.player-progress-fill{height:100%;background:var(--ac);border-radius:2px;width:0;transition:width .3s linear}
.player-time{display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);font-variant-numeric:tabular-nums}
.segment-list{flex:1;overflow-y:auto;padding:6px 18px}
.segment-list::-webkit-scrollbar{width:5px}
.segment-list::-webkit-scrollbar-track{background:transparent}
.segment-list::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
.seg-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;transition:background .12s;font-size:12px}
.seg-item:hover{background:var(--bg3)}.seg-item.active{background:var(--acd)}.seg-item.played{opacity:.5}
.seg-item .snum{width:20px;font-size:10px;color:var(--tx3);text-align:right;flex-shrink:0}
.seg-item .sname{width:22px;font-size:11px;font-weight:600;flex-shrink:0}
.seg-item .stxt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx2)}
.seg-item .sdur{font-size:10px;color:var(--tx3);flex-shrink:0}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;text-align:center;flex:1}
.loading-state.hidden{display:none}
.spinner{width:30px;height:30px;border:3px solid var(--bdr);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state p{font-size:13px;color:var(--tx2)}
.voice-browse-link{font-size:11px;color:var(--ac);cursor:pointer;text-decoration:none;margin-top:2px}
.voice-browse-link:hover{text-decoration:underline}
.custom-voice-badge{font-size:11px;color:var(--ac);background:var(--acd);padding:2px 8px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.voice-modal{position:fixed;top:0;left:0;right:0;bottom:0;z-index:300;display:flex;align-items:center;justify-content:center}
.voice-modal.hidden{display:none}
.voice-modal-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6)}
.voice-modal-content{position:relative;width:680px;max-width:95vw;max-height:80vh;background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.voice-modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bdr)}
.voice-modal-header h3{font-size:15px;font-weight:600}
.modal-close{width:28px;height:28px;border:none;background:transparent;color:var(--tx3);font-size:20px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg4);color:var(--tx1)}
.voice-modal-search{display:flex;gap:8px;padding:12px 18px;border-bottom:1px solid var(--bdr)}
.voice-modal-search input{flex:1;background:var(--bg3);border:1px solid var(--bdr);color:var(--tx1);padding:8px 12px;border-radius:6px;font-size:13px;outline:none;font-family:inherit}
.voice-modal-search input:focus{border-color:var(--ac)}
.voice-modal-search select{background:var(--bg3);border:1px solid var(--bdr);color:var(--tx1);padding:8px;border-radius:6px;font-size:13px;outline:none;max-width:140px}
.voice-modal-list{flex:1;overflow-y:auto;padding:8px 18px}
.voice-modal-list::-webkit-scrollbar{width:5px}
.voice-modal-list::-webkit-scrollbar-track{background:transparent}
.voice-modal-list::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
.voice-loading{text-align:center;padding:40px;color:var(--tx3);font-size:13px}
.voice-group{margin-bottom:12px}
.voice-group-title{font-size:12px;font-weight:600;color:var(--tx2);padding:6px 0;border-bottom:1px solid var(--bdr);margin-bottom:4px}
.voice-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:background .12s;font-size:13px}
.voice-item:hover{background:var(--bg3)}
.voice-item-name{flex:1;color:var(--tx1)}.voice-item-gender{color:var(--tx3);font-size:14px;width:16px;text-align:center}.voice-item-id{color:var(--tx3);font-size:11px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;padding:8px 18px;border-radius:20px;font-size:12px;background:var(--ac);color:#fff;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.error-banner{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--rd);padding:10px 14px;border-radius:6px;margin:10px 14px;font-size:12px}
@media(max-width:1000px){.main{grid-template-columns:1fr}.editor-panel{min-height:350px}.output-panel{max-height:none;min-height:350px}.app{padding:0 12px 20px}}
</style>
</head>
<body>
<div class="app">
<header class="header">
  <div class="header-left">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a4 4 0 0 1 4 4v4a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M6 12a6 6 0 0 0 12 0"/><path d="M12 18v4M8 22h8"/></svg>
    <h1>AI 播客</h1>
    <span class="header-subtitle">浏览器版 · Web Speech TTS</span>
  </div>
  <div class="header-right">
    <div class="theme-switcher" id="themeSwitcher">
      <div class="theme-dot dark active" data-theme="dark" title="暗黑"></div>
      <div class="theme-dot light" data-theme="light" title="亮白"></div>
      <div class="theme-dot purple" data-theme="purple" title="魅紫"></div>
      <div class="theme-dot gray" data-theme="gray" title="岩灰"></div>
    </div>
    <button id="saveBtn" class="save-btn" title="保存">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      <span>保存</span>
    </button>
  </div>
</header>

<main class="main">
  <section class="panel editor-panel">
    <div class="panel-header">
      <div>
        <h2>📄 文稿编辑</h2>
        <div class="mode-desc">粘贴播客文稿，自动识别对话并生成音频。支持多个主持人。</div>
      </div>
      <div class="header-actions">
        <label class="action-btn" title="从文件导入"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span>导入</span><input type="file" id="fileInput" accept=".md,.txt"/></label>
      </div>
    </div>
    <div class="mode-content">
      <textarea id="scriptInput" placeholder="粘贴播客文稿...&#10;&#10;支持格式：&#10;小竹：大家好，欢迎收听今天的播客。&#10;溪溪老师：大家好，我是溪溪老师。&#10;&#10;也支持带 emoji 前缀（🎙️ 小竹：xxx）和 Markdown 文件。"></textarea>
      <div class="editor-footer"><span class="char-count"><span id="scriptCharCount">0</span> 字 · <span id="scriptLineCount">0</span> 行对话</span></div>
    </div>
  </section>

  <div class="right-col">
    <section class="panel voice-panel">
      <div class="panel-header">
        <h2>🎤 音色配置</h2>
        <div class="header-actions">
          <button id="detectHostsBtn" class="action-btn" title="从文稿检测主持人"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>检测</span></button>
          <button id="addHostBtn" class="action-btn" title="添加主持人"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>添加</span></button>
        </div>
      </div>
      <div class="voice-config-grid"><div id="hostCardsContainer"></div></div>
      <button id="generateBtn" class="btn-generate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span>生成音频</span>
      </button>
      <div class="mode-hint">使用浏览器内置语音合成。首次使用请等待语音库加载。</div>
    </section>

    <section class="panel output-panel">
      <div class="panel-header">
        <div class="output-tabs">
          <button class="tab active" data-output="script">文稿预览</button>
          <button class="tab" data-output="audio">音频播放</button>
        </div>
        <button id="expandBtn" class="expand-btn" title="放大">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </button>
      </div>
      <div id="loadingState" class="loading-state hidden"><div class="spinner"></div><p id="loadingText">正在解析...</p></div>
      <div class="output-content" id="output-script">
        <div id="scriptPlaceholder" class="placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>粘贴文稿，点击生成音频</p></div>
        <div id="scriptContent" class="script-content hidden"></div>
      </div>
      <div class="output-content hidden" id="output-audio">
        <div id="audioPlaceholder" class="placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><p>生成音频后可在此播放</p></div>
        <div id="audioContent" class="audio-content hidden">
          <div id="audioPlayer" class="player">
            <div class="player-main">
              <div class="player-now">
                <div class="player-art"><div class="art-bars" id="artBars"><span></span><span></span><span></span><span></span><span></span></div></div>
                <div class="player-info"><div id="currentSpeaker" class="player-speaker">—</div><div id="currentText" class="player-text">准备播放</div></div>
              </div>
              <div class="player-controls">
                <button id="prevBtn" class="ctrl-btn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button id="playBtn" class="ctrl-btn ctrl-play"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
                <button id="nextBtn" class="ctrl-btn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
              </div>
            </div>
            <div class="player-progress" id="progressBar"><div class="player-progress-fill" id="progressFill"></div></div>
            <div class="player-time"><span id="currentTime">00:00</span><span id="totalTime">00:00</span></div>
          </div>
          <div id="segmentList" class="segment-list"></div>
        </div>
      </div>
    </section>
  </div>
</main>
</div>

<div id="voiceModal" class="voice-modal hidden">
  <div class="voice-modal-bg"></div>
  <div class="voice-modal-content">
    <div class="voice-modal-header"><h3>音色浏览器</h3><button id="voiceModalClose" class="modal-close">&times;</button></div>
    <div class="voice-modal-search">
      <input type="text" id="voiceSearch" placeholder="搜索语音..."/>
      <select id="voiceLocaleFilter" class="host-voice"><option value="">所有语言</option><option value="zh-CN">中文</option><option value="zh-HK">粤语</option><option value="zh-TW">中文台湾</option><option value="en">英语</option><option value="ja">日语</option><option value="ko">韩语</option></select>
    </div>
    <div id="voiceList" class="voice-modal-list"><div class="voice-loading">加载语音列表...</div></div>
  </div>
</div>

<script>
// ====== CONSTANTS ======
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const COLORS=['var(--ha)','var(--hb)','#fbbf24','#f472b6','#60a5fa','#a3e635'];

// ====== STATE ======
const S={
  hosts:[{name:'小竹',voice:'',speed:5,pitch:0,volume:0,_customVoice:null,_customLabel:null},
         {name:'溪溪老师',voice:'',speed:5,pitch:0,volume:0,_customVoice:null,_customLabel:null}],
  segments:[],audioFiles:[],cur:-1,playing:false,utt:null
};
let voicesReady=false,allVoices=[];

// ====== SCRIPT PARSING ======
function parseScript(raw){
  const META=/^(角色|使用说明|生成音频建议|可用工具|建议|提示|注意|说明|注|全文完)[：:]/;
  const MD=/^(#{1,6}\s|>\s*$|---|\*\*\*|[\s]*$)/;
  const lines=raw.split('\n'),segs=[],spks=new Set();
  for(const l of lines){
    const t=l.trim();if(!t||MD.test(t))continue;
    if(META.test(t.replace(/^>\s*/, '')))continue;
    if(!/[：:]/.test(t))continue;
    let c=t.replace(/^>\s*/, '').replace(/^[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]\u{FE0F}?\s*/u,'').replace(/^[\u{FE0F}\u{200D}]+\s*/u,'').trim();
    if(!c)continue;
    const m=c.match(/^(.+?)\s*[：:]\s*(.+)/);if(!m)continue;
    const sp=m[1].trim(),tx=m[2].trim();
    if(!tx||tx.length<2||META.test(sp+'：'))continue;
    spks.add(sp);segs.push({speaker:sp,text:tx});
  }
  return {segments:segs,speakers:[...spks]};
}

// ====== HOST CARDS ======
function renderHostCards(){
  const ct=$('#hostCardsContainer');ct.innerHTML='';
  S.hosts.forEach((h,i)=>{
    const color=COLORS[i%COLORS.length];
    const voiceOpts=allVoices.length
      ? allVoices.filter(v=>v.lang.startsWith('zh')||v.lang.startsWith('en')).slice(0,20).map(v=>'<option value="'+esc(v.name)+'"'+(h._customVoice===v.name?' selected':'')+'>'+esc(v.name)+' ('+esc(v.lang)+')</option>').join('')
      : '<option value="">加载中...</option>';
    const d=document.createElement('div');d.className='voice-card';
    d.innerHTML=
      '<div class="voice-card-top">'+
        '<div class="voice-avatar" style="background:'+color+';color:var(--bg2)"><svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>'+
        '<div class="voice-card-info">'+
          '<input class="host-name" value="'+esc(h.name)+'" data-idx="'+i+'" placeholder="主持人名">'+
          (h._customVoice?'<div class="custom-voice-badge">🎤 '+esc(h._customLabel||h._customVoice)+'</div>':'')+
          '<select class="host-voice" data-idx="'+i+'">'+voiceOpts+'</select>'+
          '<a class="voice-browse-link" data-idx="'+i+'">浏览系统语音...</a>'+'<button class="host-preview" data-idx="'+i+'">🔊 试听</button>'+
        '</div>'+
        (S.hosts.length>2?'<button class="host-remove" data-idx="'+i+'">&times;</button>':'')+
      '</div>'+
      '<div class="voice-sliders">'+
        '<div class="slider-group"><div class="slider-label"><span>语速</span><span class="slider-val" data-idx="'+i+'-speed">'+spdLabel(h.speed)+'</span></div><input type="range" class="slider host-speed" data-idx="'+i+'" min="-50" max="100" value="'+h.speed+'" step="5"></div>'+
        '<div class="slider-group"><div class="slider-label"><span>语调</span><span class="slider-val" data-idx="'+i+'-pitch">'+(h.pitch>=0?'+':'')+h.pitch+'</span></div><input type="range" class="slider host-pitch" data-idx="'+i+'" min="-20" max="20" value="'+h.pitch+'" step="1"></div>'+
        '<div class="slider-group"><div class="slider-label"><span>音量</span><span class="slider-val" data-idx="'+i+'-volume">'+(100+h.volume)+'%</span></div><input type="range" class="slider host-volume" data-idx="'+i+'" min="-50" max="0" value="'+h.volume+'" step="5"></div>'+
      '</div>';
    ct.appendChild(d);
  });
  bindHostEvents();
}

function bindHostEvents(){
  $$('.host-name').forEach(el=>el.addEventListener('input',()=>{S.hosts[+el.dataset.idx].name=el.value}));
  $$('.host-voice').forEach(el=>el.addEventListener('change',()=>{
    const h=S.hosts[+el.dataset.idx];
    h._customVoice=el.value;h._customLabel=el.selectedOptions[0]?.text||el.value;
  }));
  $$('.host-remove').forEach(el=>el.addEventListener('click',()=>{S.hosts.splice(+el.dataset.idx,1);renderHostCards()}));
  $('.voice-browse-link').forEach(el=>el.addEventListener('click',()=>openVoiceModal(+el.dataset.idx)));$('.host-preview').forEach(el=>el.addEventListener('click',()=>previewHost(+el.dataset.idx)));
  [['.host-speed','speed','-speed',spdLabel],['.host-pitch','pitch','-pitch',v=>(v>=0?'+':'')+v],['.host-volume','volume','-volume',v=>(100+v)+'%']]
    .forEach(([sel,key,suf,fmt])=>{$$(sel).forEach(sl=>{const up=()=>{const v=+sl.value;S.hosts[+sl.dataset.idx][key]=v;const d=document.querySelector('.slider-val[data-idx="'+sl.dataset.idx+suf+'"]');if(d)d.textContent=fmt(v)};sl.addEventListener('input',up);up()})});
}

function addHost(n,v,s,p,vol){S.hosts.push({name:n||'主持人'+(S.hosts.length+1),voice:v||'',speed:s!=null?s:5,pitch:p!=null?p:0,volume:vol!=null?vol:0,_customVoice:null,_customLabel:null});renderHostCards()}
$('#addHostBtn').addEventListener('click',()=>addHost());
$('#detectHostsBtn').addEventListener('click',()=>{
  const sc=$('#scriptInput').value.trim();if(!sc)return;
  const {speakers}=parseScript(sc);if(!speakers.length)return;
  const old={};S.hosts.forEach(h=>old[h.name]=h);
  S.hosts=speakers.map((n,i)=>old[n]||{name:n,voice:'',speed:5,pitch:0,volume:0,_customVoice:null,_customLabel:null});
  renderHostCards();
});


// ====== VOICE PREVIEW ======
let previewUtt=null;
function previewHost(idx){
  if(previewUtt){speechSynthesis.cancel();previewUtt=null}
  const h=S.hosts[idx];
  const sample=h.name+'，你好，这是一段语音测试。欢迎使用AI播客。语速、语调、音量均可自由调节。';
  const u=new SpeechSynthesisUtterance(sample);
  const vu=getSpeakerVoice(h.name);if(vu)u.voice=vu.raw;
  u.rate=1+(h.speed/100);u.pitch=1+(h.pitch/100);u.volume=1+(h.volume/100);
  const btns=document.querySelectorAll('.host-preview');const btn=btns[idx];
  u.onstart=()=>{if(btn)btn.classList.add('playing')};
  u.onend=()=>{previewUtt=null;if(btn)btn.classList.remove('playing')};
  u.onerror=()=>{previewUtt=null;if(btn)btn.classList.remove('playing')};
  previewUtt=u;speechSynthesis.speak(u);
}
// ====== VOICE MODAL ======

let voiceModalTarget=0;
function openVoiceModal(idx){voiceModalTarget=idx;$('#voiceModal').classList.remove('hidden');renderVoiceList()}
function closeVoiceModal(){$('#voiceModal').classList.add('hidden')}
function renderVoiceList(){
  const q=($('#voiceSearch').value||'').toLowerCase(),loc=$('#voiceLocaleFilter').value;
  let voices=allVoices;
  if(loc)voices=voices.filter(v=>v.lang.startsWith(loc));
  if(q)voices=voices.filter(v=>v.name.toLowerCase().includes(q)||v.lang.toLowerCase().includes(q));
  if(!voices.length){$('#voiceList').innerHTML='<div class="voice-loading">无匹配语音</div>';return}
  const groups={};voices.forEach(v=>{if(!groups[v.lang])groups[v.lang]=[];groups[v.lang].push(v)});
  let h='';
  for(const[lang,list]of Object.entries(groups).sort()){
    h+='<div class="voice-group"><div class="voice-group-title">'+esc(lang)+' ('+list.length+')</div>';
    list.forEach(v=>{h+='<div class="voice-item" data-voice="'+esc(v.name)+'" data-label="'+esc(v.name)+'"><span class="voice-item-name">'+esc(v.name)+'</span><span class="voice-item-id">'+esc(v.lang)+'</span></div>'});
    h+='</div>';
  }
  $('#voiceList').innerHTML=h;
  $$('.voice-item').forEach(it=>it.addEventListener('click',()=>{
    S.hosts[voiceModalTarget]._customVoice=it.dataset.voice;S.hosts[voiceModalTarget]._customLabel=it.dataset.label;
    renderHostCards();closeVoiceModal();
  }));
}
$('#voiceModalClose').addEventListener('click',closeVoiceModal);
$('#voiceModal .voice-modal-bg').addEventListener('click',closeVoiceModal);
$('#voiceSearch').addEventListener('input',renderVoiceList);
$('#voiceLocaleFilter').addEventListener('change',renderVoiceList);

// ====== GENERATE ======
function getSpeakerVoice(name){
  const h=S.hosts.find(x=>x.name===name||name.includes(x.name));
  if(!h)return null;
  if(h._customVoice){const v=allVoices.find(x=>x.name===h._customVoice);if(v)return v}
  if(!allVoices.length)return null;
  const zhVoices=allVoices.filter(v=>v.lang.startsWith('zh-CN'));
  const idx=S.hosts.indexOf(h);
  return zhVoices[idx%zhVoices.length]||allVoices[0];
}

$('#generateBtn').addEventListener('click',()=>{
  const sc=$('#scriptInput').value.trim();if(!sc)return;
  if(!voicesReady){showError('语音库加载中，请稍后再试...');return}
  const {segments}=parseScript(sc);if(!segments.length){showError('未识别到对话内容');return}
  S.segments=segments;S.audioFiles=segments.map((s,i)=>({speaker:s.speaker,text:s.text,index:i}));
  S.cur=-1;S.playing=false;if(S.utt){speechSynthesis.cancel();S.utt=null}
  renderScript();renderAudioUI();switchTab('script');
  showToast('已解析 '+segments.length+' 段对话');
});

// ====== PLAYBACK ======
function resumePlayback(idx){
  if(idx<0||idx>=S.audioFiles.length){S.playing=false;updatePlayBtn();stopBars();return}
  S.cur=idx;
  const seg=S.audioFiles[idx],h=S.hosts.find(x=>x.name===seg.speaker||seg.speaker.includes(x.name))||S.hosts[0];
  const vu=getSpeakerVoice(seg.speaker);
  const u=new SpeechSynthesisUtterance(seg.text);
  if(vu)u.voice=vu.raw;
  u.rate=1+(h.speed/100);u.pitch=1+(h.pitch/100);u.volume=1+(h.volume/100);
  u.onstart=()=>{updateNowPlaying(seg);highlightSeg(idx);startBars();updatePlayBtn();S.playing=true};
  u.onend=()=>{markPlayed(idx);resumePlayback(idx+1)};
  u.onerror=()=>{resumePlayback(idx+1)};
  S.utt=u;speechSynthesis.speak(u);
}

function loadSegment(idx){
  speechSynthesis.cancel();S.utt=null;S.playing=false;
  updatePlayBtn();stopBars();
  if(idx<0||idx>=S.audioFiles.length)return;
  resumePlayback(idx);
}

$('#playBtn').addEventListener('click',()=>{
  if(S.playing){speechSynthesis.cancel();S.playing=false;updatePlayBtn();stopBars();return}
  if(!S.audioFiles.length)return;
  if(S.cur<0)S.cur=0;
  resumePlayback(S.cur);
});
$('#prevBtn').addEventListener('click',()=>{if(S.cur>0)loadSegment(S.cur-1)});
$('#nextBtn').addEventListener('click',()=>{if(S.cur<S.audioFiles.length-1)loadSegment(S.cur+1)});

function updateNowPlaying(seg){
  $('#currentSpeaker').textContent=seg.speaker;
  $('#currentSpeaker').style.color=COLORS[S.hosts.findIndex(x=>x.name===seg.speaker||seg.speaker.includes(x.name))%COLORS.length]||'var(--ha)';
  $('#currentText').textContent=seg.text;
  $$('.script-segment').forEach(el=>el.classList.remove('playing'));
  const sel=document.querySelector('.script-segment[data-index="'+seg.index+'"]');
  if(sel){sel.classList.add('playing');sel.scrollIntoView({block:'nearest',behavior:'smooth'})}
}
function highlightSeg(i){$$('.seg-item').forEach(el=>{el.classList.remove('active');if(+el.dataset.index===i){el.classList.add('active');el.scrollIntoView({block:'nearest',behavior:'smooth'})}})}
function markPlayed(i){$$('.seg-item').forEach(el=>{if(+el.dataset.index<=i)el.classList.add('played')})}
function updatePlayBtn(){
  const b=$('#playBtn');b.classList.toggle('playing',S.playing);
  b.innerHTML=S.playing?'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="8" y="4" width="4" height="16"/></svg>':'<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
}
function startBars(){$('#artBars').classList.add('active')}
function stopBars(){$('#artBars').classList.remove('active')}

// ====== RENDER ======
function renderScript(){
  const ct=$('#scriptContent'),ph=$('#scriptPlaceholder');ct.innerHTML='';ph.classList.add('hidden');ct.classList.remove('hidden');
  S.segments.forEach((seg,i)=>{
    const d=document.createElement('div');d.className='script-segment';d.dataset.index=i;
    const hi=S.hosts.findIndex(x=>x.name===seg.speaker||seg.speaker.includes(x.name));
    const c=COLORS[hi>=0?hi%COLORS.length:i%COLORS.length];
    d.style.borderLeftColor=c;
    d.innerHTML='<div class="seg-spkr" style="background:'+c+';color:var(--bg2)">'+esc(seg.speaker.charAt(0))+'</div><div class="seg-body"><div class="seg-name" style="color:'+c+'">'+esc(seg.speaker)+'</div><div class="seg-txt">'+esc(seg.text)+'</div></div>';
    ct.appendChild(d);
  });
}
function renderAudioUI(){
  $('#audioPlaceholder').classList.add('hidden');$('#audioContent').classList.remove('hidden');
  const list=$('#segmentList');list.innerHTML='';
  S.audioFiles.forEach((f,i)=>{
    const d=document.createElement('div');d.className='seg-item';d.dataset.index=i;
    d.innerHTML='<span class="snum">'+String(i+1).padStart(2,'0')+'</span><span class="sname" style="color:var(--ha)">'+esc(f.speaker.charAt(0))+'</span><span class="stxt">'+esc(f.text.substring(0,40)+(f.text.length>40?'...':''))+'</span><span class="sdur">--:--</span>';
    d.addEventListener('click',()=>loadSegment(i));list.appendChild(d);
  });
}

// ====== TABS & EXPAND ======
function switchTab(n){
  $$('.output-tabs .tab').forEach(t=>t.classList.remove('active'));
  const tb=$('.output-tabs .tab[data-output="'+n+'"]');if(tb)tb.classList.add('active');
  $$('.output-content').forEach(c=>c.classList.add('hidden'));
  $('#output-'+n).classList.remove('hidden');
}
$$('.output-tabs .tab').forEach(t=>t.addEventListener('click',()=>{switchTab(t.dataset.output)}));
$('#expandBtn').addEventListener('click',()=>{
  const p=$('.output-panel');p.classList.toggle('expanded');
  $('#expandBtn svg').innerHTML=p.classList.contains('expanded')?'<polyline points="4 8 10 14 16 8"/>':'<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
});

// ====== FILE IMPORT ======
$('#fileInput').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{$('#scriptInput').value=ev.target.result;$('#scriptInput').dispatchEvent(new Event('input'));setTimeout(()=>$('#detectHostsBtn').click(),200)};r.readAsText(f);
});
$('#scriptInput').addEventListener('input',()=>{const v=$('#scriptInput').value;$('#scriptCharCount').textContent=v.length;$('#scriptLineCount').textContent=v.split('\n').filter(l=>/[：:]/.test(l)).length});
$('#scriptInput').addEventListener('paste',()=>setTimeout(()=>$('#detectHostsBtn').click(),300));

// ====== SAVE ======
function saveState(){
  const data={script:$('#scriptInput').value,hosts:S.hosts};
  localStorage.setItem('ai-podcast-static',JSON.stringify(data));
  $('#saveBtn').classList.add('saved');setTimeout(()=>$('#saveBtn').classList.remove('saved'),1200);
  showToast('已保存');
}
function restoreState(){
  try{const r=localStorage.getItem('ai-podcast-static');if(!r)return;const d=JSON.parse(r);
    if(d.script){$('#scriptInput').value=d.script;$('#scriptInput').dispatchEvent(new Event('input'))}
    if(d.hosts&&d.hosts.length){S.hosts=d.hosts;renderHostCards()}
  }catch(e){}
}
$('#saveBtn').addEventListener('click',saveState);
let at;document.addEventListener('input',e=>{if(!e.target.closest('#scriptInput,.host-name,.host-voice,.host-speed,.host-pitch,.host-volume'))return;clearTimeout(at);at=setTimeout(saveState,2000)});

// ====== UTILS ======
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function spdLabel(v){return(1+v/100).toFixed(2)+'x'}
function showError(m){const ex=$('.error-banner');if(ex)ex.remove();const b=document.createElement('div');b.className='error-banner';b.textContent=m;$('#output-script').prepend(b);setTimeout(()=>b.remove(),8000)}
function showToast(m){let t=document.querySelector('.toast');if(!t){t=document.createElement('div');t.className='toast';document.body.appendChild(t)}t.textContent=m;t.classList.add('show');clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),1500)}

// ====== THEME ======
const savedTheme=localStorage.getItem('ai-podcast-theme')||'dark';
document.documentElement.setAttribute('data-theme',savedTheme);
$$('.theme-dot').forEach(d=>{d.classList.toggle('active',d.dataset.theme===savedTheme);d.addEventListener('click',()=>{const t=d.dataset.theme;document.documentElement.setAttribute('data-theme',t);localStorage.setItem('ai-podcast-theme',t);$$('.theme-dot').forEach(x=>x.classList.remove('active'));d.classList.add('active')})});

// ====== VOICE INIT ======
function initVoices(){
  allVoices=speechSynthesis.getVoices().map(v=>({name:v.name,lang:v.lang,raw:v}));
  if(allVoices.length){voicesReady=true;renderHostCards();return}
  voicesReady=false;
}
initVoices();
speechSynthesis.onvoiceschanged=()=>{initVoices();renderHostCards()};

// ====== KEYBOARD ======
document.addEventListener('keydown',e=>{if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;if(e.code==='Space'&&S.audioFiles.length){e.preventDefault();$('#playBtn').click()}});

// ====== INIT ======
renderHostCards();restoreState();
</script>
</body>
</html>
